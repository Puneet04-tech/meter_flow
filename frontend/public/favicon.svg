<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0c"/>
      <stop offset="100%" style="stop-color:#121216"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- MeterFlow Icon -->
  <g transform="translate(6, 8)">
    <!-- Meter -->
    <rect x="0" y="0" width="20" height="12" rx="2" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <rect x="2" y="2" width="16" height="8" rx="1" fill="url(#accent)" opacity="0.2"/>
    
    <!-- Meter needle -->
    <line x1="10" y1="6" x2="14" y2="3" stroke="#ff003c" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10" cy="6" r="1.5" fill="#ff003c"/>
    
    <!-- Flow arrows -->
    <path d="M 4 10 L 6 8 L 6 9 L 8 9 L 8 11 L 6 11 L 6 12 Z" fill="url(#accent)" opacity="0.8"/>
    <path d="M 12 10 L 14 8 L 14 9 L 16 9 L 16 11 L 14 11 L 14 12 Z" fill="url(#accent)" opacity="0.8"/>
  </g>
  
  <!-- Glow effect -->
  <rect width="32" height="32" rx="6" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>
</svg>
