apiVersion: apps/v1
kind: Deployment
metadata:
  name: meterflow-backend
  labels:
    app: meterflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meterflow-backend
  template:
    metadata:
      labels:
        app: meterflow-backend
    spec:
      containers:
      - name: backend
        image: meterflow/backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: meterflow-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: meterflow-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: meterflow-secrets
              key: jwt-secret
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: meterflow-secrets
              key: stripe-secret-key
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: meterflow-secrets
              key: stripe-webhook-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: meterflow-backend-service
spec:
  selector:
    app: meterflow-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meterflow-frontend
  labels:
    app: meterflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meterflow-frontend
  template:
    metadata:
      labels:
        app: meterflow-frontend
    spec:
      containers:
      - name: frontend
        image: meterflow/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: meterflow-frontend-service
spec:
  selector:
    app: meterflow-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meterflow-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - api.meterflow.com
    - app.meterflow.com
    secretName: meterflow-tls
  rules:
  - host: api.meterflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meterflow-backend-service
            port:
              number: 80
  - host: app.meterflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meterflow-frontend-service
            port:
              number: 80
